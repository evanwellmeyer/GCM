[run]
mode = "full"
scheme = "mixed"
sampling = "random"
spinup_days = 2000
perturb_days = 2000
fixed_sst = false
plot = true
device = "auto"
label = ""
preserve_ensemble_shape = false

[numerics]
dt = 900.0
nlevels = 20
rad_interval_steps = 8
diag_interval_days = 10

[initial]
ps0 = 100000.0
ts_init = 290.0

[forcing]
solar_constant = 1360.0
zenith_factor = 0.25
co2 = 400.0
co2_ref = 400.0
co2_2x = 800.0

[radiation]
scheme = "semi_gray"

[radiation.longwave]
f_window = 0.15
kappa_wv = 0.15
co2_log_factor = 0.14
co2_base_tau = 1.50

[radiation.shortwave]
sw_kappa_wv = 0.01
albedo = 0.28

[radiation.trace_gases]
enabled = false
ch4 = 1.8
ch4_ref = 1.8
ch4_base_tau = 0.00
ch4_log_factor = 0.00
n2o = 0.332
n2o_ref = 0.332
n2o_base_tau = 0.00
n2o_log_factor = 0.00
o3_lw_tau = 0.00
o3_sw_tau = 0.00
other_ghg_tau = 0.00

[radiation.clouds]
enabled = false
cloud_fraction = 0.0
cloud_sw_reflectivity = 0.0
cloud_sw_tau = 0.0
cloud_lw_tau = 0.0
cloud_top_sigma = 0.65
cloud_bottom_sigma = 0.95

[calibration]
enabled = false
scheme = "mf"
spinup_days = 100
fixed_sst = false
batch_candidates = true
batch_size = 16
last_n = 10
equilibrium_window = 10
diag_interval_days = 10
rad_interval_steps = 8
top_n = 5
ts_threshold = 0.1
toa_threshold = 1.0
label = ""

[calibration.targets]
ts = 300.0
olr = 240.0
asr = 240.0
toa_net = 0.0
surface_net_flux = 0.0

[calibration.scales]
ts = 5.0
olr = 20.0
asr = 20.0
toa_net = 5.0
surface_net_flux = 10.0

[calibration.parameter_grid]
# albedo = [0.28, 0.32]
# f_window = [0.15, 0.20]
# kappa_wv = [0.10, 0.15]
# co2_base_tau = [1.00, 1.50]

[params]
# non-radiation parameter overrides can go here. by default this section is
# left empty so sampled runs still use the ensemble parameter ranges defined
# in scm/ensemble.py.
#
# examples:
# tau_cape = 3600.0
# mf_mb_max = 0.05
# bm_max_dt_day = 10.0
