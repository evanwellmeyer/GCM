[run]
mode = "full"
scheme = "mf"
sampling = "fixed"
plot = false
label = "radiation_calibration"

[radiation]
scheme = "semi_gray"

[radiation.trace_gases]
enabled = false

[radiation.clouds]
enabled = false

[cloud_microphysics]
enabled = false

[params]
boundary_layer_scheme = "constant"
surface_heat_levels = 8
surface_moisture_levels = 3

[calibration]
enabled = true
scheme = "mf"
spinup_days = 100
fixed_sst = false
batch_candidates = true
batch_size = 16
last_n = 10
equilibrium_window = 10
diag_interval_days = 10
rad_interval_steps = 8
top_n = 5
label = "baseline"

[calibration.targets]
ts = 300.0
olr = 240.0
asr = 240.0
toa_net = 0.0
surface_net_flux = 0.0

[calibration.scales]
ts = 5.0
olr = 20.0
asr = 20.0
toa_net = 5.0
surface_net_flux = 10.0

[calibration.parameter_grid]
albedo = [0.32, 0.34, 0.36]
f_window = [0.20, 0.22, 0.24]
kappa_wv = [0.08, 0.10]
co2_base_tau = [0.80, 1.00]
